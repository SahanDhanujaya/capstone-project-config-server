spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/SahanDhanujaya/capstone-project-configurations.git
          search-paths: platform, services
        native:
          search-locations:
            - classpath:/configurations
            - classpath:/configurations/platform
            - classpath:/configurations/services
      fail-fast: false

server:
  port: 9000